services:
  api:
    build: 
      context: .
      dockerfile: containers/api/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      
      - sandbox-temp:/app/temp
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  sandbox-temp:
    name: sandbox-temp  